<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 智能记账软件</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        header h1 { font-size: 28px; margin-bottom: 10px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-card h3 { font-size: 14px; color: #666; margin-bottom: 8px; }
        .stat-card .amount { font-size: 24px; font-weight: bold; }
        .stat-card.income .amount { color: #52c41a; }
        .stat-card.expense .amount { color: #f5222d; }
        .stat-card.balance .amount { color: #1890ff; }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h2 {
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-success { background: #52c41a; color: white; }
        .btn-danger { background: #f5222d; color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab {
            padding: 8px 16px;
            border: none;
            background: #f0f0f0;
            border-radius: 6px;
            cursor: pointer;
        }
        .tab.active { background: #667eea; color: white; }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .category-btn {
            padding: 8px;
            border: 1px solid #d9d9d9;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
            transition: all 0.2s;
        }
        .category-btn:hover { border-color: #667eea; background: #f0f5ff; }
        .category-btn.selected { background: #667eea; color: white; border-color: #667eea; }
        .record-list { max-height: 300px; overflow-y: auto; }
        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
        }
        .record-item:last-child { border-bottom: none; }
        .record-category { font-weight: 500; }
        .record-note { font-size: 12px; color: #999; }
        .record-amount { font-size: 16px; font-weight: bold; }
        .record-amount.income { color: #52c41a; }
        .record-amount.expense { color: #f5222d; }
        .record-time { font-size: 11px; color: #999; }
        .progress-bar {
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #52c41a, #f5222d);
            border-radius: 10px;
            transition: width 0.3s;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }
        .calendar-header {
            text-align: center;
            padding: 8px;
            font-weight: bold;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 12px;
        }
        .calendar-day {
            aspect-ratio: 1;
            padding: 4px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            font-size: 11px;
        }
        .calendar-day.has-data { background: #e6f7ff; border-color: #1890ff; }
        .calendar-day .day-income { color: #52c41a; font-size: 9px; }
        .calendar-day .day-expense { color: #f5222d; font-size: 9px; }
        .chart-container { margin-top: 20px; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            width: 90%;
        }
        .empty-state { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <!-- 密码验证层 -->
    <div id="passwordLayer" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 9999; display: flex; align-items: center; justify-content: center;">
        <div style="background: white; padding: 40px; border-radius: 16px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); max-width: 360px; width: 90%;">
            <div style="font-size: 48px; margin-bottom: 20px;">🔒</div>
            <h2 style="margin-bottom: 10px; color: #333;">记账软件</h2>
            <p style="color: #666; margin-bottom: 25px; font-size: 14px;">请输入密码访问</p>
            <input type="password" id="pwdInput" placeholder="输入密码" style="width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; margin-bottom: 15px; text-align: center;">
            <button onclick="checkPassword()" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;">进入</button>
            <p id="pwdError" style="color: #f5222d; margin-top: 15px; font-size: 14px; display: none;">密码错误</p>
        </div>
    </div>

    <div class="container" id="mainContainer" style="display: none;">
        <header>
            <h1>💰 智能记账软件</h1>
            <p>数据自动保存在浏览器本地</p>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card income">
                <h3>💰 本月收入</h3>
                <div class="amount" id="monthIncome">¥0.00</div>
            </div>
            <div class="stat-card expense">
                <h3>💸 本月支出</h3>
                <div class="amount" id="monthExpense">¥0.00</div>
            </div>
            <div class="stat-card balance">
                <h3>📊 本月结余</h3>
                <div class="amount" id="monthBalance">¥0.00</div>
            </div>
            <div class="stat-card">
                <h3>💵 总资产</h3>
                <div class="amount" id="totalBalance" style="color: #1890ff;">¥0.00</div>
            </div>
        </div>
        
        <div class="card" style="margin-bottom: 20px;">
            <h2>📋 本月预算</h2>
            <div class="form-group" style="display: flex; gap: 10px;">
                <input type="number" id="budgetInput" placeholder="设置每月预算" style="flex: 1;">
                <button class="btn btn-primary" onclick="setBudget()" style="width: auto;">设置</button>
            </div>
            <div id="budgetDisplay" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="budgetProgress" style="width: 0%;"></div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 5px; font-size: 12px; color: #666;">
                    <span id="budgetUsed">已用: ¥0</span>
                    <span id="budgetTotal">预算: ¥0</span>
                    <span id="budgetRemain">剩余: ¥0</span>
                </div>
            </div>
        </div>
        
        <div class="main-grid">
            <div class="card">
                <h2>📝 记一笔</h2>
                <div class="tabs">
                    <button class="tab active" onclick="switchType('expense')">支出</button>
                    <button class="tab" onclick="switchType('income')">收入</button>
                </div>
                
                <div class="form-group">
                    <label>金额</label>
                    <input type="number" id="amount" step="0.01" placeholder="0.00">
                </div>
                
                <div class="form-group">
                    <label>分类</label>
                    <div class="category-grid" id="categoryGrid"></div>
                    <input type="hidden" id="selectedCategory">
                </div>
                
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="note" placeholder="可选">
                </div>
                
                <button class="btn btn-primary" onclick="addRecord()">💾 保存记录</button>
            </div>
            
            <div class="card">
                <h2>🕐 最近记录</h2>
                <div class="record-list" id="recordList">
                    <div class="empty-state">暂无记录</div>
                </div>
            </div>
        </div>
        
        <div class="card" style="margin-top: 20px;">
            <h2>📊 图表统计</h2>
            <div class="tabs">
                <button class="tab active" onclick="switchChart('trend')">收支趋势</button>
                <button class="tab" onclick="switchChart('category')">分类统计</button>
                <button class="tab" onclick="switchChart('calendar')">日历视图</button>
            </div>
            
            <div id="chart-trend" class="chart-container">
                <canvas id="trendChart" style="max-height: 300px;"></canvas>
            </div>
            
            <div id="chart-category" class="chart-container" style="display: none;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <canvas id="expenseChart" style="max-height: 250px;"></canvas>
                    <canvas id="incomeChart" style="max-height: 250px;"></canvas>
                </div>
            </div>
            
            <div id="chart-calendar" class="chart-container" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <button class="btn btn-secondary" onclick="changeMonth(-1)">◀</button>
                    <h3 id="calendarTitle"></h3>
                    <button class="btn btn-secondary" onclick="changeMonth(1)">▶</button>
                </div>
                <div id="calendarGrid" class="calendar-grid"></div>
            </div>
        </div>
        
        <div class="card" style="margin-top: 20px;">
            <h2>📤 数据管理</h2>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="exportData()">📥 导出JSON</button>
                <button class="btn btn-success" onclick="document.getElementById('importFile').click()">📤 导入</button>
                <input type="file" id="importFile" style="display: none;" accept=".json" onchange="importData(this)">
                <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清空</button>
            </div>
        </div>
    </div>
    
    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <h3 id="modalTitle">详情</h3>
            <div id="modalBody"></div>
            <button class="btn btn-primary" onclick="closeModal()" style="margin-top: 15px; width: 100%;">关闭</button>
        </div>
    </div>

    <script>
        // 分类数据
        const categories = {
            expense: {
                "餐饮": ["早餐", "午餐", "晚餐", "夜宵", "饮品", "做饭买菜食材", "水果", "零食"],
                "交通": ["滴滴打车", "花小猪", "美团打车", "腾讯打车", "高德打车", "百度打车", "顺风车/私家车"],
                "购物": [],
                "淘宝购物": [],
                "抖音购物": [],
                "拼多多购物": [],
                "京东购物": [],
                "闲鱼购物": [],
                "苹果商店": [],
                "iCloud订阅": [],
                "淘宝万象台推广": [],
                "个人生活": ["衣服", "鞋子", "生活用品", "化妆品", "理发", "话费充值", "烟", "快递费", "彩票"],
                "住房": ["房贷", "租房", "生活水费", "电费", "饮用水", "物业费"],
                "游戏充值": ["我的世界", "腾讯视频钻石", "天天酷跑", "王者荣耀"],
                "信用卡手续费": [],
                "保险理财": [],
                "孝敬长辈": [],
                "人情世故": [],
                "平台服务费": [],
                "亏损": [],
                "token充值": ["Kimi-K2.6充值", "DeepSeek充值", "Openai-GPT-5.5充值", "智谱ai充值", "Minimax-M2.7", "阿里巴巴Qwen充值", "XiaoMi充值", "Claude充值"],
                "学习投资": [],
                "医疗健康": ["医院看病", "药店买药"],
                "休闲娱乐": ["朋友AA聚餐", "KTV唱歌", "我请客吃饭", "旅游度假", "休闲爱好"],
                "娱乐": [],
                "其他": []
            },
            income: {
                "工资": [],
                "工资收入": [],
                "奖金": [],
                "投资": [],
                "店铺收入": ["心悦会员", "苹果卡折扣"],
                "好运收入": [],
                "二手转卖": [],
                "红包收入": [],
                "其他收入": []
            }
        };
        
        // 数据存储
        let records = JSON.parse(localStorage.getItem('accounting_records') || '[]');
        let budget = JSON.parse(localStorage.getItem('accounting_budget') || '{"monthly": 0}');
        let currentType = 'expense';
        let currentChart = 'trend';
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth() + 1;
        let selectedCategory = '';
        let trendChart, expenseChart, incomeChart;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderCategories();
            updateStats();
            renderRecords();
            loadBudget();
            loadTrendChart();
        });
        
        // 切换类型
        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.tabs .tab').forEach((t, i) => {
                t.classList.toggle('active', i === (type === 'expense' ? 0 : 1));
            });
            renderCategories();
        }
        
        // 渲染分类
        function renderCategories() {
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = '';
            const cats = categories[currentType];
            
            Object.keys(cats).forEach(cat => {
                const btn = document.createElement('div');
                btn.className = 'category-btn';
                btn.textContent = cat;
                btn.onclick = () => selectCategory(cat, btn);
                grid.appendChild(btn);
                
                (cats[cat] || []).forEach(sub => {
                    const subBtn = document.createElement('div');
                    subBtn.className = 'category-btn';
                    subBtn.style.fontSize = '11px';
                    subBtn.textContent = sub;
                    subBtn.onclick = () => selectCategory(sub, subBtn);
                    grid.appendChild(subBtn);
                });
            });
        }
        
        // 选择分类
        function selectCategory(cat, btn) {
            selectedCategory = cat;
            document.getElementById('selectedCategory').value = cat;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }
        
        // 添加记录
        function addRecord() {
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('selectedCategory').value;
            const note = document.getElementById('note').value;
            
            if (!amount || amount <= 0) {
                alert('请输入金额');
                return;
            }
            if (!category) {
                alert('请选择分类');
                return;
            }
            
            const record = {
                time: new Date().toISOString(),
                category: category,
                amount: currentType === 'expense' ? -amount : amount,
                note: note
            };
            
            records.unshift(record);
            localStorage.setItem('accounting_records', JSON.stringify(records));
            
            // 重置表单
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
            document.getElementById('selectedCategory').value = '';
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
            selectedCategory = '';
            
            updateStats();
            renderRecords();
            
            if (currentChart === 'trend') loadTrendChart();
            else if (currentChart === 'category') loadCategoryChart();
            else if (currentChart === 'calendar') loadCalendar();
        }
        
        // 更新统计
        function updateStats() {
            const currentMonthStr = new Date().toISOString().slice(0, 7);
            const monthRecords = records.filter(r => r.time.slice(0, 7) === currentMonthStr);
            
            const monthIncome = monthRecords.filter(r => r.amount > 0).reduce((s, r) => s + r.amount, 0);
            const monthExpense = monthRecords.filter(r => r.amount < 0).reduce((s, r) => s + Math.abs(r.amount), 0);
            
            const totalIncome = records.filter(r => r.amount > 0).reduce((s, r) => s + r.amount, 0);
            const totalExpense = records.filter(r => r.amount < 0).reduce((s, r) => s + Math.abs(r.amount), 0);
            
            document.getElementById('monthIncome').textContent = '¥' + monthIncome.toFixed(2);
            document.getElementById('monthExpense').textContent = '¥' + monthExpense.toFixed(2);
            document.getElementById('monthBalance').textContent = '¥' + (monthIncome - monthExpense).toFixed(2);
            document.getElementById('totalBalance').textContent = '¥' + (totalIncome - totalExpense).toFixed(2);
            
            // 更新预算进度
            if (budget.monthly > 0) {
                const percent = Math.min((monthExpense / budget.monthly) * 100, 100);
                document.getElementById('budgetProgress').style.width = percent + '%';
                document.getElementById('budgetUsed').textContent = '已用: ¥' + monthExpense.toFixed(0);
                document.getElementById('budgetTotal').textContent = '预算: ¥' + budget.monthly.toFixed(0);
                document.getElementById('budgetRemain').textContent = '剩余: ¥' + (budget.monthly - monthExpense).toFixed(0);
            }
        }
        
        // 渲染记录列表
        function renderRecords() {
            const list = document.getElementById('recordList');
            if (records.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无记录</div>';
                return;
            }
            
            list.innerHTML = records.slice(0, 20).map(r => `
                <div class="record-item">
                    <div>
                        <div class="record-category">${r.category}</div>
                        ${r.note ? `<div class="record-note">${r.note}</div>` : ''}
                    </div>
                    <div style="text-align: right;">
                        <div class="record-amount ${r.amount > 0 ? 'income' : 'expense'}">
                            ${r.amount > 0 ? '+' : ''}${r.amount.toFixed(2)}
                        </div>
                        <div class="record-time">${r.time.slice(5, 16)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // 设置预算
        function setBudget() {
            const val = parseFloat(document.getElementById('budgetInput').value);
            if (val > 0) {
                budget.monthly = val;
                localStorage.setItem('accounting_budget', JSON.stringify(budget));
                document.getElementById('budgetDisplay').style.display = 'block';
                updateStats();
            }
        }
        
        // 加载预算
        function loadBudget() {
            if (budget.monthly > 0) {
                document.getElementById('budgetInput').value = budget.monthly;
                document.getElementById('budgetDisplay').style.display = 'block';
            }
        }
        
        // 切换图表
        function switchChart(type) {
            currentChart = type;
            document.querySelectorAll('.chart-container').forEach(c => c.style.display = 'none');
            document.getElementById('chart-' + type).style.display = 'block';
            
            document.querySelectorAll('.card .tabs .tab').forEach((t, i) => {
                t.classList.toggle('active', 
                    (type === 'trend' && i === 0) || 
                    (type === 'category' && i === 1) || 
                    (type === 'calendar' && i === 2));
            });
            
            if (type === 'trend') loadTrendChart();
            else if (type === 'category') loadCategoryChart();
            else if (type === 'calendar') loadCalendar();
        }
        
        // 加载趋势图
        function loadTrendChart() {
            const daily = {};
            records.forEach(r => {
                const day = r.time.slice(0, 10);
                if (!daily[day]) daily[day] = { income: 0, expense: 0 };
                if (r.amount > 0) daily[day].income += r.amount;
                else daily[day].expense += Math.abs(r.amount);
            });
            
            const days = Object.keys(daily).sort().slice(-30);
            const incomeData = days.map(d => daily[d].income);
            const expenseData = days.map(d => daily[d].expense);
            
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();
            
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: days.map(d => d.slice(5)),
                    datasets: [{
                        label: '收入',
                        data: incomeData,
                        borderColor: '#52c41a',
                        backgroundColor: 'rgba(82, 196, 26, 0.1)',
                        tension: 0.4
                    }, {
                        label: '支出',
                        data: expenseData,
                        borderColor: '#f5222d',
                        backgroundColor: 'rgba(245, 34, 45, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }
        
        // 加载分类图
        function loadCategoryChart() {
            const catData = { income: {}, expense: {} };
            records.forEach(r => {
                const type = r.amount > 0 ? 'income' : 'expense';
                if (!catData[type][r.category]) catData[type][r.category] = 0;
                catData[type][r.category] += Math.abs(r.amount);
            });
            
            const expCats = Object.entries(catData.expense).sort((a, b) => b[1] - a[1]).slice(0, 8);
            const incCats = Object.entries(catData.income).sort((a, b) => b[1] - a[1]).slice(0, 8);
            
            if (expenseChart) expenseChart.destroy();
            if (incomeChart) incomeChart.destroy();
            
            expenseChart = new Chart(document.getElementById('expenseChart'), {
                type: 'doughnut',
                data: {
                    labels: expCats.map(c => c[0]),
                    datasets: [{
                        data: expCats.map(c => c[1]),
                        backgroundColor: ['#f5222d', '#ff7875', '#ffa39e', '#ffccc7', '#ffd8bf', '#ffe7ba', '#fff1b8', '#ffffb8']
                    }]
                },
                options: { responsive: true, plugins: { title: { display: true, text: '支出分类' } } }
            });
            
            incomeChart = new Chart(document.getElementById('incomeChart'), {
                type: 'doughnut',
                data: {
                    labels: incCats.map(c => c[0]),
                    datasets: [{
                        data: incCats.map(c => c[1]),
                        backgroundColor: ['#52c41a', '#73d13d', '#95de64', '#b7eb8f', '#d9f7be', '#f6ffed']
                    }]
                },
                options: { responsive: true, plugins: { title: { display: true, text: '收入分类' } } }
            });
        }
        
        // 加载日历
        function loadCalendar() {
            const daily = {};
            records.forEach(r => {
                const day = r.time.slice(0, 10);
                if (!daily[day]) daily[day] = { income: 0, expense: 0 };
                if (r.amount > 0) daily[day].income += r.amount;
                else daily[day].expense += Math.abs(r.amount);
            });
            
            const firstDay = new Date(currentYear, currentMonth - 1, 1);
            const lastDay = new Date(currentYear, currentMonth, 0);
            const startDay = firstDay.getDay();
            const daysInMonth = lastDay.getDate();
            
            document.getElementById('calendarTitle').textContent = `${currentYear}年${currentMonth}月`;
            
            let html = '';
            '日一二三四五六'.split('').forEach(d => {
                html += `<div class="calendar-header">${d}</div>`;
            });
            
            for (let i = 0; i < startDay; i++) html += '<div class="calendar-day"></div>';
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const data = daily[dateStr];
                const hasData = data && (data.income > 0 || data.expense > 0);
                
                html += `<div class="calendar-day ${hasData ? 'has-data' : ''}" onclick="showDayDetail('${dateStr}')">`;
                html += `<div>${day}</div>`;
                if (hasData) {
                    if (data.income > 0) html += `<div class="day-income">+${data.income.toFixed(0)}</div>`;
                    if (data.expense > 0) html += `<div class="day-expense">-${data.expense.toFixed(0)}</div>`;
                }
                html += '</div>';
            }
            
            document.getElementById('calendarGrid').innerHTML = html;
        }
        
        // 切换月份
        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            loadCalendar();
        }
        
        // 显示某天详情
        function showDayDetail(date) {
            const dayRecords = records.filter(r => r.time.slice(0, 10) === date);
            if (dayRecords.length === 0) return;
            
            document.getElementById('modalTitle').textContent = date + ' 收支详情';
            document.getElementById('modalBody').innerHTML = dayRecords.map(r => `
                <div style="padding: 8px; border-bottom: 1px solid #eee;">
                    <span style="color: ${r.amount > 0 ? '#52c41a' : '#f5222d'}; font-weight: bold;">
                        ${r.amount > 0 ? '+' : ''}${r.amount.toFixed(2)}
                    </span>
                    <span style="margin-left: 10px;">${r.category}</span>
                    ${r.note ? `<span style="color: #999; margin-left: 10px;">(${r.note})</span>` : ''}
                </div>
            `).join('');
            
            document.getElementById('detailModal').classList.add('active');
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }
        
        // 导出数据
        function exportData() {
            const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `记账数据_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
        }
        
        // 导入数据
        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        records = data;
                        localStorage.setItem('accounting_records', JSON.stringify(records));
                        updateStats();
                        renderRecords();
                        alert('导入成功！');
                    }
                } catch (err) {
                    alert('导入失败：' + err.message);
                }
            };
            reader.readAsText(file);
        }
        
        // 清空数据
        function clearAllData() {
            if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) return;
            if (!confirm('再次确认：真的要清空所有数据吗？')) return;
            
            records = [];
            localStorage.removeItem('accounting_records');
            updateStats();
            renderRecords();
            alert('数据已清空');
        }

        // 密码验证
        const CORRECT_PASSWORD = '123456'; // 修改这里设置你的密码

        function checkPassword() {
            const input = document.getElementById('pwdInput').value;
            if (input === CORRECT_PASSWORD) {
                document.getElementById('passwordLayer').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'block';
            } else {
                document.getElementById('pwdError').style.display = 'block';
                document.getElementById('pwdInput').value = '';
            }
        }

        // 回车键提交
        document.getElementById('pwdInput')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
